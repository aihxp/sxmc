name: Bug Report
description: Report a bug in sxmc
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: sxmc version
      description: "Output of `sxmc --version`"
      placeholder: "sxmc 0.1.1"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "macOS 15 arm64 / Ubuntu 24.04 x86_64 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant CLI output
      description: Paste any relevant terminal output here.
      render: text
